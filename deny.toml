[advisories]
version = 2
ignore = [
    # bincode: unmaintained advisory (RUSTSEC-2025-0141); no safe upgrade exists;
    # cargo-audit already allows this as a warning.
    { id = "RUSTSEC-2025-0141", reason = "No safe upgrade available; bincode team considers 1.3.3 complete" },
    # paste: unmaintained advisory (RUSTSEC-2024-0436); only pulled in by zer-judge (excluded from CI).
    { id = "RUSTSEC-2024-0436", reason = "Only used by zer-judge (excluded from CI); no safe upgrade" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    # 0BSD: OSI-approved, more permissive than MIT; used by enum-iterator → rphonetic.
    "0BSD",
    # CDLA-Permissive-2.0: permissive data license; used by webpki-root-certs → ort-sys → zer-judge only.
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
